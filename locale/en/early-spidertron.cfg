[mod-setting-name]
yet-another-early-spidertron-remove-space-science=Don't require __ITEM__space-science-pack__

[mod-setting-description]
yet-another-early-spidertron-remove-space-science=By default, the mod only removes the __ITEM__agricultural-science-pack__ from the Spidertron technology, meaning all Nauvis science packs and __ITEM__space-science-pack__ are still required.\n\nEnable this option to also remove the __ITEM__space-science-pack__ from the technology.
